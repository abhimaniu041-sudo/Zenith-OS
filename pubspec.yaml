name: zenith_os
description: "Advanced AI Super-App with Device Control, Gemini AI, and Creative Tools."
publish_to: 'none' # Isse pub.dev par upload hone se rokta hai
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Auth (Email and Phone OTP)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0 # Credit system aur user data ke liye

  # AI Engine (Gemini)
  google_generative_ai: ^0.4.0

  # Device Control (Shizuku Fix)
  shizuku_channel:
    git:
      url: https://github.com/RikkaApps/shizuku-api.git
      path: flutter

  # UI & Tools
  pdf: ^3.10.8 # CV/Resume builder ke liye
  printing: ^5.11.1
  flutter_riverpod: ^2.5.1 # State management ke liye
  google_fonts: ^6.2.1 # Premium fonts ke liye
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Zenith OS Assets (Logo setup ke liye)
  assets:
    - assets/images/
